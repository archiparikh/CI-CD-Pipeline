version: '3.9'

services:
  app:
    build:
      context: .
      target: production
    image: ci-cd-pipeline-demo:local
    container_name: ci-cd-demo-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=1.0.0
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
